<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Home Dashboard - Cool-For-You</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- Modern Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background-color: #020617; /* Slate 950 */
      overflow-x: hidden;
    }

    /* Glassmorphism utilities */
    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* Realistic Ambient Glow */
    #ambient-light {
      background: radial-gradient(circle at 50% 30%, var(--glow-color) 0%, transparent 65%);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
    }

    /* Bulb Glow Enhancements */
    .bulb-core {
      transition: fill 0.5s ease, filter 0.5s ease, opacity 0.5s ease;
    }

    /* Smooth Fan Rotation */
    @keyframes spin-fan {
      100% { transform: rotate(360deg); }
    }
    .fan-blades {
      transform-origin: 100px 100px; /* Explicit center of the new SVG */
      transition: animation-duration 0.5s ease;
    }
    .speed-low { animation: spin-fan 1.5s linear infinite; }
    .speed-medium { animation: spin-fan 0.6s linear infinite; }
    .speed-high { animation: spin-fan 0.15s linear infinite; }
    .speed-off { animation: none; transform: rotate(0deg); transition: transform 2s ease-out; }

    /* Custom Color Swatches */
    .color-swatch {
      position: relative;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { ring: 2px; ring-offset: 2px; ring-offset-color: #020617; }
    .color-swatch::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid white;
      opacity: 0;
      transform: scale(1.3);
      transition: all 0.3s ease;
    }
    .color-swatch.active::after {
      opacity: 1;
      transform: scale(1.1);
    }

    /* Segmented Control for Fan */
    .segmented-btn {
      transition: all 0.3s ease;
    }
    .segmented-btn.active {
      background-color: rgba(255,255,255,0.15);
      color: white;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body class="text-slate-200 min-h-screen flex flex-col relative">

  <!-- Ambient Light Background -->
  <div id="ambient-light" class="fixed inset-0 pointer-events-none z-0"></div>

  <!-- Header -->
  <header class="w-full glass-panel py-5 text-center sticky top-0 z-50">
    <div class="flex items-center justify-center space-x-3">
      <i class="ph-fill ph-house-line text-2xl text-blue-400"></i>
      <h1 class="text-xl font-semibold tracking-widest text-white">HOME DASHBOARD</h1>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col items-center justify-center p-6 lg:p-12 z-10">
    <div class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-8 relative">

      <!-- ================= SMART LIGHT CARD ================= -->
      <div class="glass-panel rounded-3xl p-8 flex flex-col items-center relative overflow-hidden group">
        
        <!-- Card Header -->
        <div class="w-full flex justify-between items-center mb-10">
          <div>
            <h2 class="text-xl font-semibold text-white">Smart Bulb</h2>
            <p class="text-sm text-slate-400" id="light-status">Status: Off</p>
          </div>
          <button onclick="setLight('off')" class="p-3 bg-white/5 hover:bg-white/10 rounded-full transition-colors group-hover:shadow-lg">
            <i class="ph ph-power text-xl text-slate-400 hover:text-red-400 transition-colors"></i>
          </button>
        </div>

        <!-- Bulb SVG (Modern Design) -->
        <svg viewBox="0 0 100 140" class="w-32 h-44 overflow-visible mb-12 drop-shadow-2xl">
          <!-- Glow Halo -->
          <circle id="bulb-halo" cx="50" cy="50" r="40" fill="none" opacity="0" class="bulb-core blur-xl" />
          
          <!-- Base -->
          <path d="M40,110 L60,110 L58,125 C58,128 55,130 50,130 C45,130 42,128 42,125 Z" fill="#64748b"/>
          <rect x="38" y="100" width="24" height="10" rx="2" fill="#94a3b8"/>
          <line x1="38" y1="103" x2="62" y2="103" stroke="#475569" stroke-width="1.5"/>
          <line x1="38" y1="107" x2="62" y2="107" stroke="#475569" stroke-width="1.5"/>

          <!-- Glass Dome -->
          <path d="M20,50 C20,20 35,10 50,10 C65,10 80,20 80,50 C80,75 65,90 60,100 L40,100 C35,90 20,75 20,50 Z" 
                fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
          
          <!-- Inner Filament/Core -->
          <circle id="bulb-core" cx="50" cy="55" r="15" fill="#334155" class="bulb-core"/>
          <path d="M45,100 L45,70 M55,100 L55,70" stroke="#94a3b8" stroke-width="2" fill="none"/>
        </svg>

        <!-- Color Swatches -->
        <div class="flex items-center space-x-5 bg-black/20 p-3 rounded-2xl backdrop-blur-md border border-white/5">
          <div onclick="setLight('red')"   id="btn-red"   class="color-swatch w-10 h-10 rounded-full bg-rose-500 shadow-[0_0_15px_rgba(244,63,94,0.5)]"></div>
          <div onclick="setLight('white')" id="btn-white" class="color-swatch w-10 h-10 rounded-full bg-slate-100 shadow-[0_0_15px_rgba(241,245,249,0.5)]"></div>
          <div onclick="setLight('blue')"  id="btn-blue"  class="color-swatch w-10 h-10 rounded-full bg-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)]"></div>
          <div onclick="setLight('green')" id="btn-green" class="color-swatch w-10 h-10 rounded-full bg-emerald-400 shadow-[0_0_15px_rgba(52,211,153,0.5)]"></div>
        </div>
      </div>


      <!-- ================= SMART FAN CARD ================= -->
      <div class="glass-panel rounded-3xl p-8 flex flex-col items-center relative overflow-hidden">
        
        <!-- Card Header -->
        <div class="w-full flex justify-between items-center mb-6">
          <div>
            <h2 class="text-xl font-semibold text-white">Cooling Fan</h2>
            <p class="text-sm text-slate-400" id="fan-status">Speed: Low</p>
          </div>
          <i class="ph-fill ph-wind text-3xl text-slate-400 opacity-50"></i>
        </div>

        <!-- Modern Desk Fan SVG -->
        <svg viewBox="0 0 200 250" class="w-48 h-60 drop-shadow-xl mb-8">
          <!-- Stand & Base -->
          <path d="M85,230 L115,230 L108,130 L92,130 Z" fill="#475569"/>
          <ellipse cx="100" cy="230" rx="45" ry="12" fill="#334155"/>
          <ellipse cx="100" cy="225" rx="45" ry="12" fill="#475569"/>
          
          <!-- Back Motor Housing -->
          <circle cx="100" cy="100" r="25" fill="#1e293b"/>

          <!-- Blades Group (Rotating) -->
          <g id="fan-blades" class="fan-blades speed-low">
            <path d="M100,100 Q125,50 100,15 Q75,50 100,100" fill="#cbd5e1"/>
            <path d="M100,100 Q150,75 185,100 Q150,125 100,100" fill="#94a3b8"/>
            <path d="M100,100 Q75,150 100,185 Q125,150 100,100" fill="#cbd5e1"/>
            <path d="M100,100 Q50,125 15,100 Q50,75 100,100" fill="#94a3b8"/>
            <circle cx="100" cy="100" r="12" fill="#f8fafc" shadow="0 0 10px rgba(0,0,0,0.5)"/>
          </g>

          <!-- Outer Safety Grille (Static) -->
          <circle cx="100" cy="100" r="90" fill="none" stroke="#64748b" stroke-width="6"/>
          <circle cx="100" cy="100" r="65" fill="none" stroke="#64748b" stroke-width="2" opacity="0.6"/>
          <circle cx="100" cy="100" r="40" fill="none" stroke="#64748b" stroke-width="2" opacity="0.6"/>
          
          <line x1="10" y1="100" x2="190" y2="100" stroke="#64748b" stroke-width="2" opacity="0.8"/>
          <line x1="100" y1="10" x2="100" y2="190" stroke="#64748b" stroke-width="2" opacity="0.8"/>
          <line x1="36" y1="36" x2="164" y2="164" stroke="#64748b" stroke-width="2" opacity="0.8"/>
          <line x1="36" y1="164" x2="164" y2="36" stroke="#64748b" stroke-width="2" opacity="0.8"/>
        </svg>

        <!-- Segmented Speed Controller -->
        <div class="w-full bg-black/30 p-1.5 rounded-2xl flex justify-between border border-white/5 backdrop-blur-md">
          <button onclick="setFanSpeed('off')" id="fan-off" class="segmented-btn flex-1 py-2 text-sm font-medium text-slate-400 rounded-xl hover:text-white">Off</button>
          <button onclick="setFanSpeed('low')" id="fan-low" class="segmented-btn active flex-1 py-2 text-sm font-medium text-slate-400 rounded-xl hover:text-white">Low</button>
          <button onclick="setFanSpeed('medium')" id="fan-medium" class="segmented-btn flex-1 py-2 text-sm font-medium text-slate-400 rounded-xl hover:text-white">Med</button>
          <button onclick="setFanSpeed('high')" id="fan-high" class="segmented-btn flex-1 py-2 text-sm font-medium text-slate-400 rounded-xl hover:text-white">High</button>
        </div>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full glass-panel py-4 px-8 text-sm text-slate-400 flex flex-col md:flex-row items-center justify-between z-50 mt-auto">
    <span class="mb-3 md:mb-0 font-light">&copy; 2025 SURAJ BARI. Premium Edition.</span>
    <div class="flex justify-center space-x-6">
      <a href="#" class="hover:text-pink-400 hover:scale-110 transition-all"><i class="ph ph-instagram text-2xl"></i></a>
      <a href="#" class="hover:text-blue-400 hover:scale-110 transition-all"><i class="ph ph-facebook-logo text-2xl"></i></a>
      <a href="#" class="hover:text-white hover:scale-110 transition-all"><i class="ph ph-github-logo text-2xl"></i></a>
    </div>
  </footer>

  <!-- App Logic -->
  <script>
    // System Configurations
    const lightSettings = {
      red:   { hex: '#f43f5e', ambient: 'rgba(244, 63, 94, 0.25)', label: 'Crimson Red' },
      white: { hex: '#f8fafc', ambient: 'rgba(255, 255, 255, 0.15)', label: 'Daylight White' },
      blue:  { hex: '#3b82f6', ambient: 'rgba(59, 130, 246, 0.25)', label: 'Neon Blue' },
      green: { hex: '#10b981', ambient: 'rgba(16, 185, 129, 0.25)', label: 'Emerald Green' },
      off:   { hex: '#334155', ambient: 'transparent', label: 'Off' }
    };

    function setLight(color) {
      const core = document.getElementById("bulb-core");
      const halo = document.getElementById("bulb-halo");
      const ambient = document.getElementById("ambient-light");
      const statusText = document.getElementById("light-status");

      // Reset active styles on swatches
      document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('active'));
      
      const settings = lightSettings[color];

      if (color === 'off') {
        // Turn Off
        core.style.fill = settings.hex;
        core.style.filter = "none";
        
        halo.setAttribute("opacity", "0");
        
        ambient.style.opacity = "0";
        statusText.innerText = `Status: ${settings.label}`;
      } else {
        // Turn On
        document.getElementById(`btn-${color}`).classList.add('active');

        // Core Glowing
        core.style.fill = settings.hex;
        core.style.filter = `drop-shadow(0 0 15px ${settings.hex}) brightness(1.2)`;
        
        // Inner SVG Halo
        halo.setAttribute("fill", settings.hex);
        halo.setAttribute("opacity", "0.4");

        // Background Room Ambient Glow
        ambient.style.setProperty('--glow-color', settings.ambient);
        ambient.style.opacity = "1";

        statusText.innerText = `Status: ${settings.label}`;
      }
    }

    function setFanSpeed(speed) {
      const blades = document.getElementById("fan-blades");
      const statusText = document.getElementById("fan-status");
      
      // Reset segmented buttons
      document.querySelectorAll('.segmented-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`fan-${speed}`).classList.add('active');

      // Update fan animation class
      blades.className.baseVal = "fan-blades"; // Reset SVG classes
      blades.classList.add(`speed-${speed}`);
      
      // Update label text
      const labels = { 'off': 'Off', 'low': 'Low', 'medium': 'Medium', 'high': 'High' };
      statusText.innerText = `Speed: ${labels[speed]}`;
    }

  </script>
</body>
</html>
